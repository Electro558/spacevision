# DEPRECATED: This workflow deployed to GitHub Pages.
# The app is now deployed to Vercel (auto-deploys on push to main).
# This file can be safely deleted once Vercel deployment is confirmed.
name: Deploy to GitHub Pages (DEPRECATED)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      # Remove API routes — they need a server and can't be statically exported
      - run: rm -rf src/app/api

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
